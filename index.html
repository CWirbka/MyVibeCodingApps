<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urlaubspackliste ✈️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    body { font-family: 'Inter', sans-serif; }

    /* Tab states */
    .tab-active   { background: #4f46e5; color: white; box-shadow: 0 2px 8px rgba(79,70,229,0.3); }
    .tab-inactive { color: #6b7280; }

    /* Checked list items get a strikethrough + muted colour */
    .item-checked { text-decoration: line-through; color: #9ca3af; }

    /* Subtle entry animation */
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* Smooth progress bar width transitions */
    .progress-bar { transition: width 0.5s ease; }

    /* Custom checkbox that mimics <input type="checkbox"> with indigo accent */
    .checkbox {
      width: 20px; height: 20px; min-width: 20px;
      border: 2px solid #d1d5db; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s ease;
    }
    .checkbox:hover          { border-color: #6366f1; }
    .checkbox.is-checked     { background: #4f46e5; border-color: #4f46e5; }

    /* Delete button: hidden until the parent row is hovered */
    .delete-btn { opacity: 0.2; transition: opacity 0.15s; }
    .item-row:hover .delete-btn { opacity: 1; }

    /* On touch devices keep delete buttons slightly visible */
    @media (pointer: coarse) { .delete-btn { opacity: 0.4; } }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-50 via-sky-50 to-indigo-50 min-h-screen">

<!-- ═══════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════ -->
<div class="max-w-lg mx-auto px-4 py-6 pb-12">

  <!-- Header -->
  <div class="text-center mb-6">
    <div class="inline-flex items-center gap-2 bg-white px-5 py-2 rounded-full shadow-sm mb-3">
      <span class="text-2xl">✈️</span>
      <h1 class="text-xl font-bold text-indigo-700">Urlaubspackliste</h1>
    </div>
    <p class="text-gray-400 text-sm">Dein smarter Reisebegleiter</p>
  </div>

  <!-- Tab Navigation -->
  <div class="flex bg-white rounded-2xl shadow-sm mb-5 p-1 gap-1">
    <button onclick="setTab('planner')"  id="tab-planner"  class="flex-1 py-2.5 px-2 rounded-xl text-xs sm:text-sm font-semibold transition-all tab-active">🗺️ Reiseplaner</button>
    <button onclick="setTab('baselist')" id="tab-baselist" class="flex-1 py-2.5 px-2 rounded-xl text-xs sm:text-sm font-semibold transition-all tab-inactive">📋 Basisliste</button>
    <button onclick="setTab('archive')"  id="tab-archive"  class="flex-1 py-2.5 px-2 rounded-xl text-xs sm:text-sm font-semibold transition-all tab-inactive">🗄️ Archiv</button>
  </div>

  <!-- Tab Panels -->
  <div id="content-planner"  class="fade-in"></div>
  <div id="content-baselist" class="hidden fade-in"></div>
  <div id="content-archive"  class="hidden fade-in"></div>

</div>

<!-- Toast Notification -->
<div id="toast"
     class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-full shadow-xl text-sm font-medium z-50 hidden transition-all">
</div>

<!-- ═══════════════════════════════════════════════════════════
     JAVASCRIPT
     ═══════════════════════════════════════════════════════════ -->
<script>

// ─────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────

/** localStorage keys — centralised so refactoring never breaks persistence. */
const STORAGE_KEYS = {
  BASE_LIST:    'packApp_baseList',
  SAVED_TRIPS:  'packApp_savedTrips',
  CURRENT_TRIP: 'packApp_currentTrip',
};

/**
 * IDs of the three built-in base-list categories.
 * Used to distinguish them from user-created custom categories.
 */
const BUILT_IN_CATEGORY_IDS = ['health', 'documents', 'basics'];

/** Emoji quick-picks shown in the "New Category" form of the base list. */
const QUICK_EMOJI_PICKS = ['📦','🎒','🧳','💊','🧴','🎿','🏋️','🎯','🎨','📚','🍽️','💼','🎵','🧹','🛒'];

/** SVG checkmark rendered inside a checked checkbox. */
const CHECKMARK_SVG = `<svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24"
  stroke="currentColor" stroke-width="3">
  <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
</svg>`;


// ─────────────────────────────────────────────────────────────
// UI STATE  (ephemeral — not persisted to localStorage)
// ─────────────────────────────────────────────────────────────

/** Currently selected weather option in the setup form. */
let selectedWeather = 'warm';

/** Emoji that will be assigned to the next new base-list category. */
let newCategoryEmoji = '📦';

/** Set of category IDs whose item list is currently collapsed in the planner. */
let collapsedCategoryIds = new Set();

/** Timestamp of the last explicit base-list save (null = never saved manually). */
let baseListLastSaved = null;

/** Handle for the active toast auto-dismiss timer. */
let toastTimer = null;


// ─────────────────────────────────────────────────────────────
// PERSISTENCE LAYER
// ─────────────────────────────────────────────────────────────

/**
 * Reads a JSON-encoded value from localStorage.
 * Returns `fallback` when the key is absent or the stored JSON is corrupt,
 * so the caller never has to guard against parse errors.
 *
 * @param {string} storageKey  - The localStorage key to read.
 * @param {*}      fallback    - Value returned when the key is missing or invalid.
 * @returns {*} Parsed value or fallback.
 */
function loadFromStorage(storageKey, fallback) {
  try {
    const raw = localStorage.getItem(storageKey);
    return raw ? JSON.parse(raw) : fallback;
  } catch (_parseError) {
    return fallback;
  }
}

/**
 * Writes a single value to localStorage as a JSON string.
 * Errors are silently swallowed (e.g. in private-browsing mode).
 *
 * @param {string} storageKey - The key to write to.
 * @param {*}      value      - The value to serialise.
 */
function persistToStorage(storageKey, value) {
  try { localStorage.setItem(storageKey, JSON.stringify(value)); } catch (_) {}
}

/**
 * Persists the entire app state to localStorage in a single pass.
 * Called after every mutation so no explicit "Save" gesture is required
 * for trip and base-list data.
 */
function persistAll() {
  persistToStorage(STORAGE_KEYS.BASE_LIST,    state.baseList);
  persistToStorage(STORAGE_KEYS.SAVED_TRIPS,  state.savedTrips);
  persistToStorage(STORAGE_KEYS.CURRENT_TRIP, state.currentTrip);
}

/**
 * Persists only the base list and records the save timestamp.
 * Used by all base-list mutations so the save indicator stays accurate.
 */
function persistBaseList() {
  persistAll();
  baseListLastSaved = new Date();
}


// ─────────────────────────────────────────────────────────────
// DEFAULTS & DATA MIGRATION
// ─────────────────────────────────────────────────────────────

/**
 * Returns the factory-default base list — the three Tenerife categories
 * that serve as the starting point when localStorage is empty.
 *
 * @returns {Array<{id:string, emoji:string, name:string, items:string[]}>}
 */
function getDefaultBaseList() {
  return [
    {
      id: 'health', emoji: '🛡️', name: 'Gesundheit & Medikamente',
      items: ['Blutdrucktabletten', 'Cholesterinsenker', 'Nasenspray Algovir', 'Esberitox'],
    },
    {
      id: 'documents', emoji: '📄', name: 'Dokumente & Wichtiges',
      items: ['Pass', 'Tickets', 'Hotelbuchungen', 'Auslandskrankenversicherung / Versichertenkarte', 'Parknachweis'],
    },
    {
      id: 'basics', emoji: '⭐', name: 'Basics',
      items: ['Brille', 'Sonnenbrille'],
    },
  ];
}

/**
 * Converts data loaded from localStorage to the current array format.
 *
 * v1 (legacy) stored the base list as a plain object:
 *   { health: [...], documents: [...], basics: [...] }
 *
 * v2 (current) uses an ordered array of category objects so that users
 * can add, remove, and reorder categories freely.
 *
 * @param {*} rawData - Whatever was stored in localStorage (or null).
 * @returns {Array}   - A valid v2 base-list array.
 */
function migrateBaseListFormat(rawData) {
  if (!rawData)              return getDefaultBaseList();   // First launch
  if (Array.isArray(rawData)) return rawData;               // Already v2

  // Migrate v1 object → v2 array
  return [
    { id: 'health',    emoji: '🛡️', name: 'Gesundheit & Medikamente', items: rawData.health    || [] },
    { id: 'documents', emoji: '📄', name: 'Dokumente & Wichtiges',     items: rawData.documents || [] },
    { id: 'basics',    emoji: '⭐', name: 'Basics',                    items: rawData.basics    || [] },
  ];
}


// ─────────────────────────────────────────────────────────────
// APP STATE
// ─────────────────────────────────────────────────────────────

const state = {
  currentTrip: loadFromStorage(STORAGE_KEYS.CURRENT_TRIP, null),
  baseList:    migrateBaseListFormat(loadFromStorage(STORAGE_KEYS.BASE_LIST, null)),
  savedTrips:  loadFromStorage(STORAGE_KEYS.SAVED_TRIPS, []),
};


// ─────────────────────────────────────────────────────────────
// UTILITIES
// ─────────────────────────────────────────────────────────────

/** Generates a short, collision-resistant unique string ID. */
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

/**
 * Escapes `text` so it is safe to embed in innerHTML without XSS risk.
 * Uses the browser's own text-node serialisation rather than a regex.
 *
 * @param   {string} text - Raw user-supplied string.
 * @returns {string}       HTML-safe version.
 */
function escapeHtml(text) {
  const node = document.createElement('div');
  node.appendChild(document.createTextNode(String(text)));
  return node.innerHTML;
}

/**
 * Converts a plain string array into checklist item objects
 * suitable for storage and rendering.
 *
 * @param   {string[]} textArray - Array of item label strings.
 * @returns {{ id:string, text:string, checked:boolean }[]}
 */
function createItems(textArray) {
  return textArray.map(text => ({ id: generateId(), text, checked: false }));
}

/**
 * Computes how many items in a trip are checked vs. total.
 *
 * @param   {object|null} trip - A trip object from state.
 * @returns {{ total:number, checked:number, pct:number }}
 */
function calculateProgress(trip) {
  if (!trip) return { total: 0, checked: 0, pct: 0 };
  let total = 0, checked = 0;
  trip.categories.forEach(category =>
    category.items.forEach(item => { total++; if (item.checked) checked++; })
  );
  return { total, checked, pct: total ? Math.round((checked / total) * 100) : 0 };
}


// ─────────────────────────────────────────────────────────────
// SMART CHECKLIST GENERATOR
// ─────────────────────────────────────────────────────────────

/**
 * Generates a complete trip checklist by merging two layers:
 *
 *  1. BASE LAYER — every category currently in state.baseList is copied
 *     verbatim into the checklist (1:1 merge). This ensures custom
 *     categories and user-edited items are always carried over.
 *
 *  2. SMART RULES LAYER — additional categories/items are added on top
 *     based on the trip configuration:
 *       • Always added:   ⏳ Vorher sicherstellen, 👕 Anziehsachen, 🔌 Elektronik
 *       • Weather = warm: 🏊 Schwimmen  (+ UV-protection items)
 *       • Sport = true:   🏃 Sport  +  Polar charger in Elektronik
 *
 *  Dynamic quantities (clothing):
 *       Socken & Unterhosen = days + 1
 *       T-Shirts            = days
 *       Poloshirts          = ⌈days / 2⌉
 *
 * @param {{ name:string, days:number|string, weather:'warm'|'cold', sports:boolean }} tripConfig
 * @returns {object} A fully populated trip object ready for state.currentTrip.
 */
function generateChecklist(tripConfig) {
  const { name, weather, sports } = tripConfig;
  const durationDays = parseInt(tripConfig.days) || 7;
  const categories   = [];

  // ── 1. Pre-trip to-do list (always first) ────────────────────
  categories.push({
    id: generateId(), emoji: '⏳', name: 'Vorher sicherstellen',
    items: createItems([
      'Download Videos und Schulungen auf das Handy (Yellowstone, Udemy AI)',
      'Checken ob die TUI-App funktioniert (brauchen wir für den Privattransfer)',
      'Bagtap aktivieren',
      'Lange schwarze Jogginghose (Studio) auf dem Flug anziehen',
    ]),
  });

  // ── 2. Base layer: all base-list categories merged 1:1 ───────
  state.baseList.forEach(baseCategory => {
    categories.push({
      id:    generateId(),
      emoji: baseCategory.emoji,
      name:  baseCategory.name,
      items: createItems([...baseCategory.items]),
    });
  });

  // ── Smart Rules ───────────────────────────────────────────────

  // 3. Clothing with dynamic quantities
  const socksCount  = durationDays + 1;
  const tShirtCount = durationDays;
  const poloCount   = Math.ceil(durationDays / 2);

  categories.push({
    id: generateId(), emoji: '👕', name: 'Anziehsachen',
    items: createItems([
      `Socken (${socksCount} Paar)`,
      `Unterhosen (${socksCount} Stück)`,
      `T-Shirts (${tShirtCount} Stück)`,
      `Poloshirts (${poloCount} Stück)`,
      'Jacke (Super Dry)',
      'Buff (Schal)',
      '1 lange Hose',
      'Leichte Jacke',
    ]),
  });

  // 4. Electronics — Polar charger added only when sports is active
  const electronicsItems = [
    'Handy (Geschäft)', 'Handy (privat)', 'Laptop', 'Kindle',
    'Kopfhörer', 'Ladekabel Handy', 'Ladekabel Laptop', 'Ladekabel Kindle',
  ];
  if (sports) electronicsItems.push('Ladegerät Herzfrequenzmessung & Polar Uhr');

  categories.push({
    id: generateId(), emoji: '🔌', name: 'Elektronik',
    items: createItems(electronicsItems),
  });

  // 5. Swimming gear + sun protection (warm weather only)
  if (weather === 'warm') {
    categories.push({
      id: generateId(), emoji: '🏊‍♂️', name: 'Schwimmen',
      items: createItems([
        'Badehose', 'Pull-Buoy', 'Schwimmbrille inkl. Anti-Beschlag Spray',
        'Badelatschen', 'UV-Schutz T-Shirt', 'Sonnenmilch Gesicht', 'Sonnenmilch Körper',
      ]),
    });
  }

  // 6. Running gear (sports checkbox only)
  if (sports) {
    categories.push({
      id: generateId(), emoji: '🏃‍♂️', name: 'Sport',
      items: createItems([
        'Laufhose', 'Laufshirt', 'Pulsmesser', 'Laufschuhe',
        'Laufsocken', 'Laufjacke', 'Laufunterhose', 'Studio? (prüfen)',
      ]),
    });
  }

  return {
    id:         generateId(),
    name,
    days:       durationDays,
    weather,
    sports,
    categories,
    createdAt:  new Date().toISOString(),
  };
}


// ─────────────────────────────────────────────────────────────
// TRIP MANAGEMENT
// ─────────────────────────────────────────────────────────────

/** Reads the setup form values, generates a new checklist, and opens it. */
function createTrip() {
  const nameInput   = document.getElementById('f-name');
  const daysInput   = document.getElementById('f-days');
  const sportsInput = document.getElementById('f-sports');
  if (!nameInput || !daysInput) return;

  state.currentTrip = generateChecklist({
    name:   nameInput.value.trim() || 'Meine Reise',
    days:   parseInt(daysInput.value) || 7,
    weather: selectedWeather,
    sports: sportsInput ? sportsInput.checked : false,
  });

  collapsedCategoryIds.clear();
  persistAll();
  renderPlanner();
}

/** Upserts the current trip into the savedTrips archive, then persists. */
function saveCurrentTrip() {
  if (!state.currentTrip) return;
  const existingIndex = state.savedTrips.findIndex(t => t.id === state.currentTrip.id);
  const tripSnapshot  = JSON.parse(JSON.stringify(state.currentTrip));

  if (existingIndex >= 0) state.savedTrips[existingIndex] = tripSnapshot;
  else                    state.savedTrips.push(tripSnapshot);

  persistAll();
  showToast('💾 Reise gespeichert!');
}

/** Clears the active trip after a confirmation prompt. */
function newTrip() {
  if (!confirm('Aktuelle Reise verwerfen und neue erstellen?')) return;
  state.currentTrip = null;
  persistToStorage(STORAGE_KEYS.CURRENT_TRIP, null);
  renderPlanner();
}

/**
 * Loads a saved trip from the archive into the active planner.
 * @param {string} tripId - ID of the trip to restore.
 */
function loadTrip(tripId) {
  const trip = state.savedTrips.find(t => t.id === tripId);
  if (!trip) return;
  if (state.currentTrip && state.currentTrip.id !== tripId) {
    if (!confirm('Aktuelle Reise durch diese ersetzen?')) return;
  }
  state.currentTrip = JSON.parse(JSON.stringify(trip));
  collapsedCategoryIds.clear();
  persistAll();
  setTab('planner');
  showToast(`📂 "${trip.name}" geladen!`);
}

/**
 * Permanently removes a trip from the archive.
 * @param {string} tripId - ID of the trip to delete.
 */
function deleteTrip(tripId) {
  const trip = state.savedTrips.find(t => t.id === tripId);
  if (!trip || !confirm(`"${trip.name}" wirklich löschen?`)) return;
  state.savedTrips = state.savedTrips.filter(t => t.id !== tripId);
  if (state.currentTrip?.id === tripId) state.currentTrip = null;
  persistAll();
  renderArchive();
  showToast('🗑️ Reise gelöscht!');
}


// ─────────────────────────────────────────────────────────────
// CHECKLIST INTERACTIONS
// ─────────────────────────────────────────────────────────────

/**
 * Toggles the checked state of a single item.
 * Uses targeted DOM updates (instead of full re-render) to stay fast.
 *
 * @param {string} categoryId - ID of the parent category.
 * @param {string} itemId     - ID of the item to toggle.
 */
function toggleItem(categoryId, itemId) {
  if (!state.currentTrip) return;

  const category = state.currentTrip.categories.find(c => c.id === categoryId);
  const item     = category?.items.find(i => i.id === itemId);
  if (!item) return;

  item.checked = !item.checked;
  persistAll();

  // Update checkbox appearance
  const checkboxEl = document.getElementById(`cb-${itemId}`);
  const labelEl    = document.getElementById(`sp-${itemId}`);
  if (checkboxEl) {
    checkboxEl.classList.toggle('is-checked', item.checked);
    checkboxEl.innerHTML = item.checked ? CHECKMARK_SVG : '';
  }
  if (labelEl) {
    labelEl.className = item.checked
      ? 'flex-1 text-sm item-checked'
      : 'flex-1 text-sm text-gray-700';
  }

  updateProgressDisplay();
}

/** Redraws the progress bar and counters without a full re-render. */
function updateProgressDisplay() {
  const progress = calculateProgress(state.currentTrip);

  const barEl = document.getElementById('prog-bar');
  const lblEl = document.getElementById('prog-lbl');
  const pctEl = document.getElementById('prog-pct');
  const msgEl = document.getElementById('prog-msg');

  if (barEl) barEl.style.width     = `${progress.pct}%`;
  if (lblEl) lblEl.textContent     = `${progress.checked} / ${progress.total} erledigt`;
  if (pctEl) pctEl.textContent     = `${progress.pct}%`;
  if (msgEl) msgEl.className       =
    progress.pct === 100
      ? 'text-center text-green-600 font-bold mt-2 text-sm'
      : 'hidden';
}

/**
 * Reads the "add item" input for a category, creates a new item,
 * appends it to the DOM directly (no full re-render), and persists.
 *
 * @param {string} categoryId - ID of the category to receive the new item.
 */
function addItemToCategory(categoryId) {
  if (!state.currentTrip) return;

  const inputEl = document.getElementById(`inp-${categoryId}`);
  if (!inputEl || !inputEl.value.trim()) return;

  const newText = inputEl.value.trim();
  inputEl.value = '';

  const category = state.currentTrip.categories.find(c => c.id === categoryId);
  if (!category) return;

  const newItem = { id: generateId(), text: newText, checked: false };
  category.items.push(newItem);
  persistAll();

  // Append row to DOM without triggering a full re-render
  const listEl = document.getElementById(`list-${categoryId}`);
  if (listEl) {
    const rowEl = document.createElement('div');
    rowEl.id        = `row-${newItem.id}`;
    rowEl.className = 'flex items-center gap-3 px-4 py-2.5 hover:bg-gray-50 transition-colors item-row';
    rowEl.innerHTML = buildCheckboxItemHtml(categoryId, newItem);
    listEl.appendChild(rowEl);
  }

  // Sync the category counter badge
  refreshCategoryCounter(categoryId);
  updateProgressDisplay();
  inputEl.focus();
}

/**
 * Removes an item from a category, updates the DOM, and persists.
 *
 * @param {string} categoryId - ID of the parent category.
 * @param {string} itemId     - ID of the item to remove.
 */
function deleteItem(categoryId, itemId) {
  if (!state.currentTrip) return;

  const category = state.currentTrip.categories.find(c => c.id === categoryId);
  if (!category) return;

  category.items = category.items.filter(i => i.id !== itemId);
  persistAll();

  document.getElementById(`row-${itemId}`)?.remove();
  refreshCategoryCounter(categoryId);
  updateProgressDisplay();
}

/**
 * Collapses or expands a category card in the planner.
 * @param {string} categoryId - ID of the category to toggle.
 */
function toggleCategory(categoryId) {
  if (collapsedCategoryIds.has(categoryId)) collapsedCategoryIds.delete(categoryId);
  else                                      collapsedCategoryIds.add(categoryId);

  document.getElementById(`catbody-${categoryId}`)?.classList.toggle('hidden');
  const iconEl = document.getElementById(`caticon-${categoryId}`);
  if (iconEl) iconEl.textContent = collapsedCategoryIds.has(categoryId) ? '▶' : '▼';
}

/**
 * Updates the "x/y" counter badge on a category header.
 * Called after DOM-level item additions or deletions.
 *
 * @param {string} categoryId
 */
function refreshCategoryCounter(categoryId) {
  const category  = state.currentTrip?.categories.find(c => c.id === categoryId);
  const counterEl = document.getElementById(`cnt-${categoryId}`);
  if (!category || !counterEl) return;
  const checkedCount = category.items.filter(i => i.checked).length;
  counterEl.textContent = `${checkedCount}/${category.items.length}`;
}


// ─────────────────────────────────────────────────────────────
// WEATHER SELECTION  (Setup Form)
// ─────────────────────────────────────────────────────────────

/**
 * Updates both the module-level `selectedWeather` variable and the
 * visual highlight of the weather toggle buttons.
 *
 * @param {'warm'|'cold'} weather
 */
function selectWeather(weather) {
  selectedWeather = weather;

  const warmBtn = document.getElementById('wbtn-warm');
  const coldBtn = document.getElementById('wbtn-cold');
  if (!warmBtn || !coldBtn) return;

  const activeClasses   = ['border-indigo-500', 'bg-indigo-50'];
  const inactiveClasses = ['border-gray-200',   'bg-white'];

  if (weather === 'warm') {
    warmBtn.classList.add(...activeClasses);    warmBtn.classList.remove(...inactiveClasses);
    coldBtn.classList.add(...inactiveClasses);  coldBtn.classList.remove(...activeClasses);
  } else {
    coldBtn.classList.add(...activeClasses);    coldBtn.classList.remove(...inactiveClasses);
    warmBtn.classList.add(...inactiveClasses);  warmBtn.classList.remove(...activeClasses);
  }
}


// ─────────────────────────────────────────────────────────────
// TAB NAVIGATION
// ─────────────────────────────────────────────────────────────

/**
 * Switches the visible tab panel and re-renders its content.
 * @param {'planner'|'baselist'|'archive'} tabName
 */
function setTab(tabName) {
  const TAB_NAMES = ['planner', 'baselist', 'archive'];

  TAB_NAMES.forEach(name => {
    document.getElementById(`content-${name}`).classList.toggle('hidden', name !== tabName);

    const btnEl = document.getElementById(`tab-${name}`);
    btnEl.className = btnEl.className.replace(/tab-active|tab-inactive/g, '').trim();
    btnEl.classList.add(name === tabName ? 'tab-active' : 'tab-inactive');
  });

  if (tabName === 'planner')  renderPlanner();
  if (tabName === 'baselist') renderBaseList();
  if (tabName === 'archive')  renderArchive();
}

/**
 * Builds the inner HTML for a single checklist item row (checkbox + label + delete).
 * IDs follow the pattern `cb-{itemId}` and `sp-{itemId}` so toggleItem()
 * can update individual rows without re-rendering the whole list.
 *
 * @param {string} categoryId
 * @param {{ id:string, text:string, checked:boolean }} item
 * @returns {string} HTML string (safe to inject via innerHTML).
 */
function buildCheckboxItemHtml(categoryId, item) {
  const checkboxClass = `checkbox${item.checked ? ' is-checked' : ''}`;
  const labelClass    = item.checked ? 'flex-1 text-sm item-checked' : 'flex-1 text-sm text-gray-700';

  return `
    <div id="cb-${escapeHtml(item.id)}" class="${checkboxClass}"
         onclick="toggleItem('${escapeHtml(categoryId)}','${escapeHtml(item.id)}')"
         role="checkbox" aria-checked="${item.checked}">
      ${item.checked ? CHECKMARK_SVG : ''}
    </div>
    <span id="sp-${escapeHtml(item.id)}" class="${labelClass}"
          onclick="toggleItem('${escapeHtml(categoryId)}','${escapeHtml(item.id)}')"
          style="cursor:pointer">
      ${escapeHtml(item.text)}
    </span>
    <button onclick="deleteItem('${escapeHtml(categoryId)}','${escapeHtml(item.id)}')"
            class="delete-btn text-red-400 hover:text-red-600 text-xl leading-none px-1 flex-shrink-0"
            title="Löschen">×</button>
  `;
}

/**
 * Appends a new item to a base-list category, then persists and re-renders.
 * @param {string} categoryId
 * @param {string} text
 */
function addBaseItem(categoryId, text) {
  if (!text?.trim()) return;
  const category = state.baseList.find(c => c.id === categoryId);
  if (!category) return;

  category.items.push(text.trim());
  persistBaseList();
  renderBaseList();
  setTimeout(() => document.getElementById(`binp-${categoryId}`)?.focus(), 0);
}

/**
 * Removes an item from a base-list category by index, then persists and re-renders.
 * @param {string} categoryId
 * @param {number} itemIndex
 */
function removeBaseItem(categoryId, itemIndex) {
  const category = state.baseList.find(c => c.id === categoryId);
  if (!category) return;

  category.items.splice(itemIndex, 1);
  persistBaseList();
  renderBaseList();
}

/**
 * Updates the selected emoji for the "new category" form and syncs button highlights.
 * @param {string} emoji
 */
function setNewCategoryEmoji(emoji) {
  newCategoryEmoji = emoji;
  document.querySelectorAll('.emoji-pick-btn').forEach(emojiBtn => {
    const isSelected = emojiBtn.dataset.emoji === emoji;
    emojiBtn.classList.toggle('ring-2',          isSelected);
    emojiBtn.classList.toggle('ring-indigo-500', isSelected);
    emojiBtn.classList.toggle('bg-indigo-50',    isSelected);
  });
  const customEmojiInput = document.getElementById('new-cat-emoji-input');
  if (customEmojiInput) customEmojiInput.value = '';
}

/** Reads the new-category form values, pushes to state, persists, and re-renders. */
function addBaseCategory() {
  const nameInputEl  = document.getElementById('new-cat-name');
  const emojiInputEl = document.getElementById('new-cat-emoji-input');
  if (!nameInputEl?.value.trim()) { nameInputEl?.focus(); return; }

  const categoryName  = nameInputEl.value.trim();
  const categoryEmoji = emojiInputEl?.value.trim() || newCategoryEmoji;

  state.baseList.push({ id: generateId(), emoji: categoryEmoji, name: categoryName, items: [] });

  persistBaseList();
  newCategoryEmoji = '📦';
  renderBaseList();
  showToast(`✅ Kategorie "${categoryName}" hinzugefügt!`);
}

/**
 * Deletes a user-created category from the base list.
 * Built-in categories cannot be removed via this path.
 * @param {string} categoryId
 */
function removeBaseCategory(categoryId) {
  const category = state.baseList.find(c => c.id === categoryId);
  if (!category || !confirm(`Kategorie "${category.name}" wirklich löschen?`)) return;

  state.baseList = state.baseList.filter(c => c.id !== categoryId);
  persistBaseList();
  renderBaseList();
  showToast('🗑️ Kategorie gelöscht!');
}

/** Explicitly saves the base list and refreshes the save indicator. */
function explicitSaveBaseList() {
  persistBaseList();
  renderBaseList();
  showToast('💾 Basisliste gespeichert!');
}

/** Resets the base list to factory defaults after a confirmation prompt. */
function resetBaseList() {
  if (!confirm('Basisliste auf Standard zurücksetzen? Alle eigenen Änderungen gehen verloren.')) return;
  state.baseList   = getDefaultBaseList();
  newCategoryEmoji = '📦';
  persistBaseList();
  renderBaseList();
  showToast('🔄 Basisliste zurückgesetzt!');
}

/**
 * Serialises the active trip into an Obsidian-compatible Markdown file
 * and triggers a browser download.
 *
 * Output structure:
 *   1. YAML frontmatter  — date, project, tags, para_category, status
 *   2. Title + metadata  — trip name, duration, weather/sport flags
 *   3. Progress summary  — checked / total items
 *   4. Category sections — each rendered as ## heading + task list
 *      • unchecked items → `- [ ] text`
 *      • checked items   → `- [x] text`
 *
 * File naming: "{trip-name}-Packliste.md" with filesystem-unsafe chars stripped.
 */
function exportToObsidian() {
  if (!state.currentTrip) return;

  const trip     = state.currentTrip;
  const today    = new Date().toISOString().split('T')[0];   // YYYY-MM-DD
  const progress = calculateProgress(trip);

  // ── YAML Frontmatter ─────────────────────────────────────────
  let markdown = `---
erstellt: ${today}
typ: Notiz
datum: ${today}
projekt: ${trip.name}
tags:
  - urlaub
  - packliste
para_category: Note
status: in-progress
---

`;

  // ── Document Header ──────────────────────────────────────────
  markdown += `# ✈️ ${trip.name}\n\n`;
  markdown += `> ${trip.days} Tage · ${trip.weather === 'warm' ? '☀️ Warm' : '❄️ Kalt'}`;
  if (trip.sports) markdown += ' · 🏃 Sport';
  markdown += '\n\n';
  markdown += `**Fortschritt:** ${progress.checked} / ${progress.total} erledigt (${progress.pct}%)\n\n`;

  // ── Category Sections ─────────────────────────────────────────
  trip.categories.forEach(category => {
    markdown += `## ${category.emoji} ${category.name}\n\n`;

    if (category.items.length === 0) {
      markdown += '_(leer)_\n\n';
    } else {
      category.items.forEach(item => {
        markdown += `- [${item.checked ? 'x' : ' '}] ${item.text}\n`;
      });
      markdown += '\n';
    }
  });

  // ── File Download ─────────────────────────────────────────────
  const safeFilename = trip.name
    .replace(/[<>:"/\\|?*\x00-\x1f]/g, '')   // Strip filesystem-unsafe chars
    .replace(/\s+/g, '-')                       // Replace whitespace with hyphens
    + '-Packliste.md';

  const blob      = new Blob([markdown], { type: 'text/markdown;charset=utf-8' });
  const objectUrl = URL.createObjectURL(blob);
  const anchor    = document.createElement('a');

  anchor.href     = objectUrl;
  anchor.download = safeFilename;
  document.body.appendChild(anchor);
  anchor.click();
  document.body.removeChild(anchor);
  URL.revokeObjectURL(objectUrl);

  showToast('📥 Obsidian-Datei wird heruntergeladen!');
}


// ─────────────────────────────────────────────────────────────
// UI UTILITIES
// ─────────────────────────────────────────────────────────────

/**
 * Shows a temporary toast notification at the bottom of the screen.
 * Any active toast is replaced immediately; the new one fades out after 2.2 s.
 *
 * @param {string} message - Text to display.
 */
function showToast(message) {
  const toastEl = document.getElementById('toast');
  if (!toastEl) return;

  toastEl.textContent = message;
  toastEl.classList.remove('hidden');
  toastEl.style.opacity = '1';

  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toastEl.style.opacity = '0';
    setTimeout(() => toastEl.classList.add('hidden'), 300);
  }, 2200);
}

setTab('planner');

</script>
