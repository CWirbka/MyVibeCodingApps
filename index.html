<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urlaubspackliste ✈️</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
    .tab-active { background: #4f46e5; color: white; box-shadow: 0 2px 8px rgba(79,70,229,0.3); }
    .tab-inactive { color: #6b7280; }
    .item-checked { text-decoration: line-through; color: #9ca3af; }
    .fade-in { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .progress-bar-fill { transition: width 0.5s ease; }
    .checkbox-custom {
      width: 20px; height: 20px; min-width: 20px;
      border: 2px solid #d1d5db; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s ease;
    }
    .checkbox-custom:hover { border-color: #6366f1; }
    .checkbox-custom.checked { background: #4f46e5; border-color: #4f46e5; }
    .delete-btn { opacity: 0.2; transition: opacity 0.15s; }
    .item-row:hover .delete-btn { opacity: 1; }
    @media (pointer: coarse) { .delete-btn { opacity: 0.4; } }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-sky-50 to-indigo-50 min-h-screen">

<div class="max-w-lg mx-auto px-4 py-6 pb-12">

  <!-- Header -->
  <div class="text-center mb-6">
    <div class="inline-flex items-center gap-2 bg-white px-5 py-2 rounded-full shadow-sm mb-3">
      <span class="text-2xl">✈️</span>
      <h1 class="text-xl font-bold text-indigo-700">Urlaubspackliste</h1>
    </div>
    <p class="text-gray-400 text-sm">Dein smarter Reisebegleiter</p>
  </div>

  <!-- Tabs -->
  <div class="flex bg-white rounded-2xl shadow-sm mb-5 p-1 gap-1">
    <button onclick="setTab('planner')" id="tab-planner" class="flex-1 py-2.5 px-2 rounded-xl text-xs sm:text-sm font-semibold transition-all tab-active">
      🗺️ Reiseplaner
    </button>
    <button onclick="setTab('baselist')" id="tab-baselist" class="flex-1 py-2.5 px-2 rounded-xl text-xs sm:text-sm font-semibold transition-all tab-inactive">
      📋 Basisliste
    </button>
    <button onclick="setTab('archive')" id="tab-archive" class="flex-1 py-2.5 px-2 rounded-xl text-xs sm:text-sm font-semibold transition-all tab-inactive">
      🗄️ Archiv
    </button>
  </div>

  <!-- Tab Content -->
  <div id="content-planner" class="fade-in"></div>
  <div id="content-baselist" class="hidden fade-in"></div>
  <div id="content-archive" class="hidden fade-in"></div>

</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-5 py-2.5 rounded-full shadow-xl text-sm font-medium z-50 hidden transition-all"></div>

<script>
// ============================================================
// STATE
// ============================================================
let setupWeather = 'warm';
let collapsedCats = new Set();

let newCatEmoji     = '📦';
let baseListSavedAt = null;

function saveBaseList() {
  saveAll();
  baseListSavedAt = new Date();
}

let state = {
  activeTab: 'planner',
  currentTrip: null,
  baseList: migrateBaseList(loadFromStorage('packApp_baseList', null)),
  savedTrips: loadFromStorage('packApp_savedTrips', []),
};

// Init current trip from storage
state.currentTrip = loadFromStorage('packApp_currentTrip', null);

// ============================================================
// DEFAULTS
// ============================================================
function getDefaultBaseList() {
  return [
    {
      id: 'health', emoji: '🛡️', name: 'Gesundheit & Medikamente',
      items: ['Blutdrucktabletten', 'Cholesterinsenker', 'Nasenspray Algovir', 'Esberitox'],
    },
    {
      id: 'documents', emoji: '📄', name: 'Dokumente & Wichtiges',
      items: ['Pass', 'Tickets', 'Hotelbuchungen', 'Auslandskrankenversicherung / Versichertenkarte', 'Parknachweis'],
    },
    {
      id: 'basics', emoji: '⭐', name: 'Basics',
      items: ['Brille', 'Sonnenbrille'],
    },
  ];
}

function migrateBaseList(data) {
  if (!data) return getDefaultBaseList();
  if (Array.isArray(data)) return data;
  // Migrate old object format {health, documents, basics}
  return [
    { id: 'health',    emoji: '🛡️', name: 'Gesundheit & Medikamente', items: data.health    || [] },
    { id: 'documents', emoji: '📄', name: 'Dokumente & Wichtiges',     items: data.documents || [] },
    { id: 'basics',    emoji: '⭐', name: 'Basics',                    items: data.basics    || [] },
  ];
}

// ============================================================
// STORAGE
// ============================================================
function loadFromStorage(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch(e) { return fallback; }
}

function persist(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
}

function saveAll() {
  persist('packApp_baseList', state.baseList);
  persist('packApp_savedTrips', state.savedTrips);
  persist('packApp_currentTrip', state.currentTrip);
}

// ============================================================
// HELPERS
// ============================================================
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function esc(text) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(String(text)));
  return d.innerHTML;
}

function makeItems(arr) {
  return arr.map(t => ({ id: uid(), text: t, checked: false }));
}

function getProgress(trip) {
  if (!trip) return { total: 0, checked: 0, pct: 0 };
  let total = 0, checked = 0;
  trip.categories.forEach(c => c.items.forEach(i => { total++; if (i.checked) checked++; }));
  return { total, checked, pct: total ? Math.round((checked / total) * 100) : 0 };
}

// ============================================================
// SMART CHECKLIST GENERATION
// ============================================================
function generateChecklist(cfg) {
  const { name, days, weather, sports } = cfg;
  const d = parseInt(days) || 7;
  const cats = [];

  // 1. Vorher sicherstellen
  cats.push({
    id: uid(), emoji: '⏳', name: 'Vorher sicherstellen',
    items: makeItems([
      'Download Videos und Schulungen auf das Handy (Yellowstone, Udemy AI)',
      'Checken ob die TUI-App funktioniert (brauchen wir für den Privattransfer)',
      'Bagtap aktivieren',
      'Lange schwarze Jogginghose (Studio) auf dem Flug anziehen',
    ]),
  });

  // 2. ALLE Basislisten-Kategorien 1:1 als Fundament (vor den Smart Rules)
  state.baseList.forEach(baseCat => {
    cats.push({
      id: uid(),
      emoji: baseCat.emoji,
      name:  baseCat.name,
      items: makeItems([...baseCat.items]),
    });
  });

  // ── Smart Rules ──────────────────────────────────────────────

  // 3. Anziehsachen (dynamische Mengen)
  const socken     = d + 1;
  const unterhosen = d + 1;
  const tshirts    = d;
  const polos      = Math.ceil(d / 2);

  cats.push({
    id: uid(), emoji: '👕', name: 'Anziehsachen',
    items: makeItems([
      `Socken (${socken} Paar)`,
      `Unterhosen (${unterhosen} Stück)`,
      `T-Shirts (${tshirts} Stück)`,
      `Poloshirts (${polos} Stück)`,
      'Jacke (Super Dry)',
      'Buff (Schal)',
      '1 lange Hose',
      'Leichte Jacke',
    ]),
  });

  // 4. Elektronik (immer)
  const elektronik = [
    'Handy (Geschäft)',
    'Handy (privat)',
    'Laptop',
    'Kindle',
    'Kopfhörer',
    'Ladekabel Handy',
    'Ladekabel Laptop',
    'Ladekabel Kindle',
  ];
  if (sports) elektronik.push('Ladegerät Herzfrequenzmessung & Polar Uhr');
  cats.push({ id: uid(), emoji: '🔌', name: 'Elektronik', items: makeItems(elektronik) });

  // 5. Schwimmen (nur bei warmem Wetter)
  if (weather === 'warm') {
    cats.push({
      id: uid(), emoji: '🏊‍♂️', name: 'Schwimmen',
      items: makeItems([
        'Badehose', 'Pull-Buoy', 'Schwimmbrille inkl. Anti-Beschlag Spray',
        'Badelatschen', 'UV-Schutz T-Shirt', 'Sonnenmilch Gesicht', 'Sonnenmilch Körper',
      ]),
    });
  }

  // 6. Sport (wenn ausgewählt)
  if (sports) {
    cats.push({
      id: uid(), emoji: '🏃‍♂️', name: 'Sport',
      items: makeItems([
        'Laufhose', 'Laufshirt', 'Pulsmesser', 'Laufschuhe',
        'Laufsocken', 'Laufjacke', 'Laufunterhose', 'Studio? (prüfen)',
      ]),
    });
  }

  return {
    id: uid(),
    name,
    days: d,
    weather,
    sports,
    categories: cats,
    createdAt: new Date().toISOString(),
  };
}

// ============================================================
// TAB SWITCHING
// ============================================================
function setTab(tab) {
  state.activeTab = tab;
  ['planner', 'baselist', 'archive'].forEach(t => {
    document.getElementById(`content-${t}`).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}`);
    btn.className = btn.className.replace(/tab-active|tab-inactive/g, '').trim();
    btn.classList.add(t === tab ? 'tab-active' : 'tab-inactive');
  });
  if (tab === 'planner')  renderPlanner();
  if (tab === 'baselist') renderBaseList();
  if (tab === 'archive')  renderArchive();
}

// ============================================================
// WEATHER SELECTION (called from onclick in setup form)
// ============================================================
function selectWeather(w) {
  setupWeather = w;
  const warmEl = document.getElementById('wbtn-warm');
  const coldEl = document.getElementById('wbtn-cold');
  if (!warmEl || !coldEl) return;
  if (w === 'warm') {
    warmEl.classList.add('border-indigo-500', 'bg-indigo-50');
    warmEl.classList.remove('border-gray-200', 'bg-white');
    coldEl.classList.add('border-gray-200', 'bg-white');
    coldEl.classList.remove('border-indigo-500', 'bg-indigo-50');
  } else {
    coldEl.classList.add('border-indigo-500', 'bg-indigo-50');
    coldEl.classList.remove('border-gray-200', 'bg-white');
    warmEl.classList.add('border-gray-200', 'bg-white');
    warmEl.classList.remove('border-indigo-500', 'bg-indigo-50');
  }
}

// ============================================================
// CREATE TRIP
// ============================================================
function createTrip() {
  const nameEl  = document.getElementById('f-name');
  const daysEl  = document.getElementById('f-days');
  const sportsEl = document.getElementById('f-sports');
  if (!nameEl || !daysEl) return;

  const name   = nameEl.value.trim() || 'Meine Reise';
  const days   = parseInt(daysEl.value) || 7;
  const sports = sportsEl ? sportsEl.checked : false;

  state.currentTrip = generateChecklist({ name, days, weather: setupWeather, sports });
  collapsedCats.clear();
  saveAll();
  renderPlanner();
}

function newTrip() {
  if (!confirm('Aktuelle Reise verwerfen und neue erstellen?')) return;
  state.currentTrip = null;
  persist('packApp_currentTrip', null);
  renderPlanner();
}

function saveCurrentTrip() {
  if (!state.currentTrip) return;
  const idx = state.savedTrips.findIndex(t => t.id === state.currentTrip.id);
  if (idx >= 0) state.savedTrips[idx] = JSON.parse(JSON.stringify(state.currentTrip));
  else          state.savedTrips.push(JSON.parse(JSON.stringify(state.currentTrip)));
  saveAll();
  showToast('💾 Reise gespeichert!');
}

// ============================================================
// CHECKLIST ACTIONS
// ============================================================
function toggleItem(catId, itemId) {
  if (!state.currentTrip) return;
  const cat  = state.currentTrip.categories.find(c => c.id === catId);
  const item = cat && cat.items.find(i => i.id === itemId);
  if (!item) return;
  item.checked = !item.checked;
  saveAll();

  // Fast DOM update instead of full re-render
  const cb   = document.getElementById(`cb-${itemId}`);
  const span = document.getElementById(`sp-${itemId}`);
  if (cb) cb.className = cb.className.replace(/\bchecked\b/g, '').trim() + (item.checked ? ' checked' : '');
  if (span) span.className = item.checked ? 'flex-1 text-sm item-checked' : 'flex-1 text-sm text-gray-700';

  // Update progress bar
  updateProgressUI();
}

function updateProgressUI() {
  const prog = getProgress(state.currentTrip);
  const bar  = document.getElementById('prog-bar');
  const lbl  = document.getElementById('prog-lbl');
  const pct  = document.getElementById('prog-pct');
  const msg  = document.getElementById('prog-msg');
  if (bar)  bar.style.width  = prog.pct + '%';
  if (lbl)  lbl.textContent  = `${prog.checked} / ${prog.total} erledigt`;
  if (pct)  pct.textContent  = prog.pct + '%';
  if (msg)  msg.className    = prog.pct === 100 ? 'text-center text-green-600 font-bold mt-2 text-sm' : 'hidden';
}

function addItemToCategory(catId) {
  if (!state.currentTrip) return;
  const inp = document.getElementById(`inp-${catId}`);
  if (!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  inp.value = '';
  const cat = state.currentTrip.categories.find(c => c.id === catId);
  if (!cat) return;
  const item = { id: uid(), text, checked: false };
  cat.items.push(item);
  saveAll();

  // Append item to DOM
  const list = document.getElementById(`list-${catId}`);
  if (list) {
    const div = document.createElement('div');
    div.id = `row-${item.id}`;
    div.className = 'flex items-center gap-3 px-4 py-2.5 hover:bg-gray-50 transition-colors item-row';
    div.innerHTML = buildItemHTML(catId, item);
    list.appendChild(div);
    updateProgressUI();
    // Update category counter
    const counter = document.getElementById(`cnt-${catId}`);
    if (counter) {
      const checked = cat.items.filter(i => i.checked).length;
      counter.textContent = `${checked}/${cat.items.length}`;
    }
  }
  inp.focus();
}

function deleteItem(catId, itemId) {
  if (!state.currentTrip) return;
  const cat = state.currentTrip.categories.find(c => c.id === catId);
  if (!cat) return;
  cat.items = cat.items.filter(i => i.id !== itemId);
  saveAll();
  const row = document.getElementById(`row-${itemId}`);
  if (row) row.remove();
  updateProgressUI();
  const counter = document.getElementById(`cnt-${catId}`);
  if (counter) {
    const checked = cat.items.filter(i => i.checked).length;
    counter.textContent = `${checked}/${cat.items.length}`;
  }
}

function toggleCategory(catId) {
  if (collapsedCats.has(catId)) collapsedCats.delete(catId);
  else collapsedCats.add(catId);
  const body = document.getElementById(`catbody-${catId}`);
  const icon = document.getElementById(`caticon-${catId}`);
  if (!body) return;
  body.classList.toggle('hidden');
  if (icon) icon.textContent = collapsedCats.has(catId) ? '▶' : '▼';
}

// ============================================================
// BUILD ITEM HTML
// ============================================================
function buildItemHTML(catId, item) {
  const cbCls = 'checkbox-custom' + (item.checked ? ' checked' : '');
  const spCls = item.checked ? 'flex-1 text-sm item-checked' : 'flex-1 text-sm text-gray-700';
  const checkSvg = `<svg class="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`;
  return `
    <div id="${esc(`cb-${item.id}`)}" class="${cbCls}" onclick="toggleItem('${esc(catId)}','${esc(item.id)}')" role="checkbox" aria-checked="${item.checked}">
      ${item.checked ? checkSvg : ''}
    </div>
    <span id="${esc(`sp-${item.id}`)}" class="${spCls}" onclick="toggleItem('${esc(catId)}','${esc(item.id)}')" style="cursor:pointer">${esc(item.text)}</span>
    <button onclick="deleteItem('${esc(catId)}','${esc(item.id)}')" class="delete-btn text-red-400 hover:text-red-600 text-xl leading-none px-1 flex-shrink-0" title="Löschen">×</button>
  `;
}

// ============================================================
// RENDER PLANNER
// ============================================================
function renderPlanner() {
  const c = document.getElementById('content-planner');
  if (!c) return;

  if (!state.currentTrip) {
    c.innerHTML = renderSetupFormHTML();
    return;
  }

  const trip = state.currentTrip;
  const prog = getProgress(trip);
  const barColor = prog.pct === 100 ? 'bg-green-500' : 'bg-indigo-500';
  const pctColor = prog.pct === 100 ? 'text-green-600' : 'text-indigo-600';

  let html = `
    <!-- Trip Header -->
    <div class="bg-white rounded-2xl shadow-sm p-4 mb-4 fade-in">
      <div class="flex items-start justify-between mb-3 gap-2">
        <div>
          <h2 class="text-lg font-bold text-gray-800">${esc(trip.name)}</h2>
          <p class="text-xs text-gray-400 mt-0.5">
            ${trip.days} Tage &middot; ${trip.weather === 'warm' ? '☀️ Warm' : '❄️ Kalt'}${trip.sports ? ' &middot; 🏃 Sport' : ''}
          </p>
        </div>
        <div class="flex gap-2 flex-shrink-0">
          <button onclick="saveCurrentTrip()" class="bg-emerald-50 text-emerald-700 border border-emerald-200 px-3 py-1.5 rounded-xl text-xs font-semibold hover:bg-emerald-100 transition-colors">
            💾 Speichern
          </button>
          <button onclick="newTrip()" class="bg-gray-50 text-gray-500 border border-gray-200 px-3 py-1.5 rounded-xl text-xs font-semibold hover:bg-gray-100 transition-colors">
            ✕ Neu
          </button>
        </div>
      </div>

      <!-- Progress -->
      <div class="flex justify-between items-center mb-1.5 text-sm">
        <span id="prog-lbl" class="text-gray-500 font-medium">${prog.checked} / ${prog.total} erledigt</span>
        <span id="prog-pct" class="font-bold ${pctColor}">${prog.pct}%</span>
      </div>
      <div class="bg-gray-100 rounded-full h-3 overflow-hidden">
        <div id="prog-bar" class="h-full rounded-full ${barColor} progress-bar-fill" style="width:${prog.pct}%"></div>
      </div>
      <div id="prog-msg" class="${prog.pct === 100 ? 'text-center text-green-600 font-bold mt-2 text-sm' : 'hidden'}">🎉 Alles eingepackt! Gute Reise!</div>

      <!-- Obsidian Export -->
      <button onclick="exportToObsidian()"
        class="mt-3 w-full bg-violet-600 hover:bg-violet-700 active:bg-violet-800 text-white rounded-xl py-3 font-bold text-sm transition-colors flex items-center justify-center gap-2 shadow-md shadow-violet-200">
        📥 Für Obsidian exportieren (.md)
      </button>
    </div>
  `;

  // Categories
  trip.categories.forEach(cat => {
    const checked = cat.items.filter(i => i.checked).length;
    const isCollapsed = collapsedCats.has(cat.id);
    const allDone = checked === cat.items.length && cat.items.length > 0;
    const catBg = allDone ? 'from-emerald-50 to-green-50' : 'from-indigo-50 to-sky-50';
    const cntColor = allDone ? 'text-emerald-600 bg-emerald-100' : 'text-indigo-600 bg-indigo-50';

    html += `
      <div class="bg-white rounded-2xl shadow-sm mb-3 overflow-hidden fade-in">
        <!-- Category Header -->
        <div class="px-4 py-3 bg-gradient-to-r ${catBg} flex items-center justify-between cursor-pointer select-none"
             onclick="toggleCategory('${cat.id}')">
          <div class="flex items-center gap-2">
            <span class="text-base">${cat.emoji}</span>
            <h3 class="font-bold text-gray-700 text-sm">${esc(cat.name)}</h3>
          </div>
          <div class="flex items-center gap-2">
            <span id="cnt-${cat.id}" class="text-xs font-semibold ${cntColor} px-2 py-0.5 rounded-full">
              ${checked}/${cat.items.length}
            </span>
            <span id="caticon-${cat.id}" class="text-gray-400 text-xs">${isCollapsed ? '▶' : '▼'}</span>
          </div>
        </div>

        <!-- Items -->
        <div id="catbody-${cat.id}" class="${isCollapsed ? 'hidden' : ''}">
          <div id="list-${cat.id}" class="divide-y divide-gray-50">
            ${cat.items.map(item => `
              <div id="row-${item.id}" class="flex items-center gap-3 px-4 py-2.5 hover:bg-gray-50 transition-colors item-row">
                ${buildItemHTML(cat.id, item)}
              </div>
            `).join('')}
          </div>

          <!-- Add Item Input -->
          <div class="px-4 py-2.5 border-t border-gray-100 flex items-center gap-2">
            <input type="text"
              id="inp-${cat.id}"
              placeholder="+ Element hinzufügen …"
              class="flex-1 text-sm text-gray-600 placeholder-gray-400 bg-transparent outline-none py-0.5 min-w-0"
              onkeydown="if(event.key==='Enter'){addItemToCategory('${cat.id}')}"
            >
            <button onclick="addItemToCategory('${cat.id}')"
              class="text-indigo-400 hover:text-indigo-600 text-xs font-semibold flex-shrink-0 transition-colors">
              Hinzufügen
            </button>
          </div>
        </div>
      </div>
    `;
  });

  c.innerHTML = html;
}

// ============================================================
// RENDER SETUP FORM
// ============================================================
function renderSetupFormHTML() {
  const warmActive = setupWeather === 'warm';
  const coldActive = !warmActive;
  const wWarm = `border-2 rounded-xl p-3 cursor-pointer flex items-center gap-3 transition-all ${warmActive ? 'border-indigo-500 bg-indigo-50' : 'border-gray-200 bg-white'}`;
  const wCold = `border-2 rounded-xl p-3 cursor-pointer flex items-center gap-3 transition-all ${coldActive ? 'border-indigo-500 bg-indigo-50' : 'border-gray-200 bg-white'}`;

  return `
    <div class="bg-white rounded-2xl shadow-sm p-5 fade-in">
      <h2 class="text-xl font-bold text-gray-800 mb-5">🗺️ Neue Reise planen</h2>

      <div class="space-y-4">
        <!-- Name -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1.5">Reisename</label>
          <input type="text" id="f-name" value="Teneriffa 2026" placeholder="z.B. Teneriffa 2026"
            class="w-full border-2 border-gray-100 focus:border-indigo-300 rounded-xl px-4 py-2.5 text-sm outline-none transition-colors bg-gray-50 focus:bg-white">
        </div>

        <!-- Days -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1.5">Dauer in Tagen</label>
          <input type="number" id="f-days" value="10" min="1" max="365"
            class="w-full border-2 border-gray-100 focus:border-indigo-300 rounded-xl px-4 py-2.5 text-sm outline-none transition-colors bg-gray-50 focus:bg-white">
          <p class="text-xs text-gray-400 mt-1">Beeinflusst Mengen: Socken & Unterhosen = Tage+1, T-Shirts = Tage, Poloshirts = ⌈Tage/2⌉</p>
        </div>

        <!-- Weather -->
        <div>
          <label class="block text-sm font-semibold text-gray-600 mb-1.5">Wetter</label>
          <div class="grid grid-cols-2 gap-3">
            <div id="wbtn-warm" class="${wWarm}" onclick="selectWeather('warm')">
              <span class="text-2xl">☀️</span>
              <div>
                <p class="text-sm font-semibold text-gray-700">Warm</p>
                <p class="text-xs text-gray-400">Strand & Sommer</p>
              </div>
            </div>
            <div id="wbtn-cold" class="${wCold}" onclick="selectWeather('cold')">
              <span class="text-2xl">❄️</span>
              <div>
                <p class="text-sm font-semibold text-gray-700">Kalt</p>
                <p class="text-xs text-gray-400">Herbst & Winter</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Sports -->
        <div onclick="document.getElementById('f-sports').click()"
             class="flex items-center gap-3 p-3.5 border-2 border-gray-100 rounded-xl cursor-pointer hover:border-indigo-200 hover:bg-indigo-50/30 transition-all select-none">
          <input type="checkbox" id="f-sports" checked class="w-4 h-4 accent-indigo-600 cursor-pointer" onclick="event.stopPropagation()">
          <div>
            <p class="text-sm font-semibold text-gray-700">🏃‍♂️ Sport-Ausrüstung mitnehmen</p>
            <p class="text-xs text-gray-400">Laufausrüstung, Pulsmesser & Polar-Ladegerät</p>
          </div>
        </div>

        <!-- Submit -->
        <button onclick="createTrip()"
          class="w-full bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded-xl py-3.5 font-bold text-sm transition-colors shadow-lg shadow-indigo-200 mt-1">
          ✨ Packliste generieren
        </button>
      </div>
    </div>
  `;
}

// ============================================================
// RENDER BASE LIST
// ============================================================
function renderBaseList() {
  const c = document.getElementById('content-baselist');
  if (!c) return;

  const builtInIds = ['health', 'documents', 'basics'];
  const QUICK_EMOJIS = ['📦','🎒','🧳','💊','🧴','🎿','🏋️','🎯','🎨','📚','🍽️','💼','🎵','🧹','🛒'];

  const savedTimeStr = baseListSavedAt
    ? baseListSavedAt.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr'
    : 'noch nicht manuell gespeichert';

  let html = `
    <!-- Save Status Bar -->
    <div class="bg-white rounded-2xl shadow-sm px-4 py-3 mb-4 flex items-center justify-between gap-3">
      <div class="flex items-center gap-2 min-w-0">
        <span class="w-2 h-2 rounded-full flex-shrink-0 ${baseListSavedAt ? 'bg-green-400' : 'bg-amber-400'}"></span>
        <div class="min-w-0">
          <p class="text-xs font-semibold text-gray-700">Basisliste</p>
          <p class="text-xs text-gray-400 truncate">Zuletzt gespeichert: ${savedTimeStr}</p>
        </div>
      </div>
      <button onclick="explicitSaveBaseList()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold px-4 py-2 rounded-xl transition-colors flex-shrink-0 shadow-sm shadow-indigo-200">
        💾 Speichern
      </button>
    </div>

    <div class="bg-indigo-50 border border-indigo-200 rounded-xl px-4 py-3 mb-4 text-sm text-indigo-700 flex items-start gap-2">
      <span class="text-base mt-0.5">ℹ️</span>
      <span>Alle Kategorien werden 1:1 in jede neue Packliste übernommen. Smart Rules (Wetter, Sport) ergänzen danach automatisch.</span>
    </div>
  `;

  state.baseList.forEach(cat => {
    const isBuiltIn = builtInIds.includes(cat.id);
    html += `
      <div class="bg-white rounded-2xl shadow-sm mb-3 overflow-hidden fade-in">
        <div class="px-4 py-3 bg-gradient-to-r from-indigo-50 to-sky-50 flex items-center justify-between">
          <h3 class="font-bold text-gray-700 text-sm">${esc(cat.emoji)} ${esc(cat.name)}</h3>
          ${!isBuiltIn ? `
            <button onclick="removeBaseCategory('${cat.id}')"
              class="text-red-300 hover:text-red-500 text-xs font-semibold transition-colors flex items-center gap-1 py-0.5 px-2 rounded-lg hover:bg-red-50">
              🗑️ Löschen
            </button>
          ` : ''}
        </div>
        <div class="divide-y divide-gray-50">
          ${cat.items.map((item, idx) => `
            <div class="flex items-center gap-3 px-4 py-2.5 group hover:bg-gray-50">
              <span class="flex-1 text-sm text-gray-700">${esc(item)}</span>
              <button onclick="removeBaseItem('${cat.id}', ${idx})"
                class="delete-btn text-red-400 hover:text-red-600 text-xl leading-none px-1" title="Löschen">×</button>
            </div>
          `).join('')}
          ${cat.items.length === 0 ? '<p class="px-4 py-3 text-sm text-gray-400 italic">Noch keine Einträge</p>' : ''}
        </div>
        <div class="px-4 py-2.5 border-t border-gray-100 flex items-center gap-2">
          <input type="text"
            id="binp-${cat.id}"
            placeholder="+ Element hinzufügen …"
            class="flex-1 text-sm text-gray-600 placeholder-gray-400 bg-transparent outline-none py-0.5 min-w-0"
            onkeydown="if(event.key==='Enter'){addBaseItem('${cat.id}',this.value);this.value=''}"
          >
          <button onclick="const el=document.getElementById('binp-${cat.id}');addBaseItem('${cat.id}',el.value);el.value=''"
            class="text-indigo-400 hover:text-indigo-600 text-xs font-semibold flex-shrink-0 transition-colors">
            Hinzufügen
          </button>
        </div>
      </div>
    `;
  });

  // ── New Category Form ──────────────────────────────────────
  html += `
    <div class="bg-white rounded-2xl shadow-sm mt-5 p-4 border-2 border-dashed border-indigo-200">
      <h3 class="font-bold text-gray-700 text-sm mb-3">➕ Neue Kategorie hinzufügen</h3>

      <p class="text-xs text-gray-500 font-medium mb-2">Emoji wählen:</p>
      <div class="flex flex-wrap gap-1.5 mb-3">
        ${QUICK_EMOJIS.map(e => `
          <button data-emoji="${e}" onclick="setNewCatEmoji('${e}')"
            class="emoji-pick-btn w-8 h-8 text-base rounded-lg hover:bg-indigo-50 flex items-center justify-center transition-all border border-transparent hover:border-indigo-200">
            ${e}
          </button>
        `).join('')}
      </div>

      <div class="flex gap-2">
        <input type="text" id="new-cat-emoji-input" maxlength="2"
          placeholder="✏️"
          title="Eigenes Emoji eintippen"
          class="w-12 border-2 border-gray-100 focus:border-indigo-300 rounded-xl px-1 py-2 text-center text-lg outline-none transition-colors bg-gray-50 focus:bg-white flex-shrink-0"
          oninput="if(this.value.trim())newCatEmoji=this.value.trim()">
        <input type="text" id="new-cat-name"
          placeholder="Kategorie-Name …"
          class="flex-1 border-2 border-gray-100 focus:border-indigo-300 rounded-xl px-3 py-2 text-sm outline-none transition-colors bg-gray-50 focus:bg-white min-w-0"
          onkeydown="if(event.key==='Enter')addBaseCategory()">
        <button onclick="addBaseCategory()"
          class="bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white rounded-xl px-4 py-2 text-sm font-bold transition-colors flex-shrink-0">
          ✓
        </button>
      </div>
    </div>

    <button onclick="resetBaseList()"
      class="w-full border-2 border-gray-200 text-gray-500 rounded-xl py-2.5 text-sm font-medium hover:bg-gray-50 hover:border-gray-300 transition-colors mt-3">
      🔄 Basisliste zurücksetzen
    </button>
  `;

  c.innerHTML = html;

  // Highlight the currently selected emoji
  document.querySelectorAll('.emoji-pick-btn').forEach(btn => {
    if (btn.dataset.emoji === newCatEmoji) {
      btn.classList.add('ring-2', 'ring-indigo-500', 'bg-indigo-50');
    }
  });
}

function addBaseItem(catId, text) {
  if (!text || !text.trim()) return;
  const cat = state.baseList.find(c => c.id === catId);
  if (!cat) return;
  cat.items.push(text.trim());
  saveBaseList();
  renderBaseList();
  setTimeout(() => { const el = document.getElementById(`binp-${catId}`); if (el) el.focus(); }, 0);
}

function removeBaseItem(catId, idx) {
  const cat = state.baseList.find(c => c.id === catId);
  if (!cat) return;
  cat.items.splice(idx, 1);
  saveBaseList();
  renderBaseList();
}

function setNewCatEmoji(emoji) {
  newCatEmoji = emoji;
  document.querySelectorAll('.emoji-pick-btn').forEach(btn => {
    const active = btn.dataset.emoji === emoji;
    btn.classList.toggle('ring-2', active);
    btn.classList.toggle('ring-indigo-500', active);
    btn.classList.toggle('bg-indigo-50', active);
  });
  const inp = document.getElementById('new-cat-emoji-input');
  if (inp) inp.value = '';
}

function addBaseCategory() {
  const nameEl  = document.getElementById('new-cat-name');
  const emojiEl = document.getElementById('new-cat-emoji-input');
  if (!nameEl || !nameEl.value.trim()) { nameEl && nameEl.focus(); return; }
  const name  = nameEl.value.trim();
  const emoji = (emojiEl && emojiEl.value.trim()) ? emojiEl.value.trim() : newCatEmoji;
  state.baseList.push({ id: uid(), emoji, name, items: [] });
  saveBaseList();
  newCatEmoji = '📦';
  renderBaseList();
  showToast(`✅ Kategorie "${name}" hinzugefügt!`);
}

function removeBaseCategory(catId) {
  const cat = state.baseList.find(c => c.id === catId);
  if (!cat || !confirm(`Kategorie "${cat.name}" wirklich löschen?`)) return;
  state.baseList = state.baseList.filter(c => c.id !== catId);
  saveBaseList();
  renderBaseList();
  showToast('🗑️ Kategorie gelöscht!');
}

function explicitSaveBaseList() {
  saveBaseList();
  renderBaseList();
  showToast('💾 Basisliste gespeichert!');
}

function resetBaseList() {
  if (!confirm('Basisliste auf Standard zurücksetzen? Alle eigenen Änderungen gehen verloren.')) return;
  state.baseList = getDefaultBaseList();
  newCatEmoji = '📦';
  saveBaseList();
  renderBaseList();
  showToast('🔄 Basisliste zurückgesetzt!');
}

// ============================================================
// RENDER ARCHIVE
// ============================================================
function renderArchive() {
  const c = document.getElementById('content-archive');
  if (!c) return;

  if (state.savedTrips.length === 0) {
    c.innerHTML = `
      <div class="text-center py-16 fade-in">
        <div class="text-6xl mb-4">🗄️</div>
        <p class="text-lg font-semibold text-gray-500">Noch keine gespeicherten Reisen</p>
        <p class="text-sm text-gray-400 mt-1">Erstelle eine Reise und speichere sie im Reiseplaner.</p>
      </div>
    `;
    return;
  }

  let html = `<div class="fade-in">`;
  [...state.savedTrips].reverse().forEach(trip => {
    const prog = getProgress(trip);
    const dt = new Date(trip.createdAt).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const barColor = prog.pct === 100 ? 'bg-green-500' : 'bg-indigo-400';
    const pctColor = prog.pct === 100 ? 'text-green-600' : 'text-indigo-600';
    const isActive = state.currentTrip && state.currentTrip.id === trip.id;

    html += `
      <div class="bg-white rounded-2xl shadow-sm mb-3 overflow-hidden">
        <div class="p-4">
          <div class="flex items-start justify-between gap-2 mb-2">
            <div>
              <div class="flex items-center gap-2">
                <h3 class="font-bold text-gray-800">${esc(trip.name)}</h3>
                ${isActive ? '<span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-0.5 rounded-full font-semibold">Aktiv</span>' : ''}
              </div>
              <p class="text-xs text-gray-400 mt-0.5">
                ${dt} &middot; ${trip.days} Tage &middot; ${trip.weather === 'warm' ? '☀️ Warm' : '❄️ Kalt'}${trip.sports ? ' &middot; 🏃 Sport' : ''}
              </p>
            </div>
            <span class="font-bold text-sm ${pctColor} flex-shrink-0">${prog.pct}%</span>
          </div>

          <div class="bg-gray-100 rounded-full h-2 mb-3 overflow-hidden">
            <div class="h-full rounded-full ${barColor} progress-bar-fill" style="width:${prog.pct}%"></div>
          </div>

          <div class="grid grid-cols-2 gap-2">
            <button onclick="loadTrip('${trip.id}')"
              class="bg-indigo-50 hover:bg-indigo-100 text-indigo-600 rounded-xl py-2 text-sm font-semibold transition-colors">
              📂 Laden
            </button>
            <button onclick="deleteTrip('${trip.id}')"
              class="bg-red-50 hover:bg-red-100 text-red-500 rounded-xl py-2 text-sm font-semibold transition-colors">
              🗑️ Löschen
            </button>
          </div>
        </div>
      </div>
    `;
  });
  html += `</div>`;
  c.innerHTML = html;
}

function loadTrip(id) {
  const trip = state.savedTrips.find(t => t.id === id);
  if (!trip) return;
  if (state.currentTrip && state.currentTrip.id !== id) {
    if (!confirm('Aktuelle Reise durch diese ersetzen?')) return;
  }
  state.currentTrip = JSON.parse(JSON.stringify(trip));
  collapsedCats.clear();
  saveAll();
  setTab('planner');
  showToast(`📂 "${trip.name}" geladen!`);
}

function deleteTrip(id) {
  const trip = state.savedTrips.find(t => t.id === id);
  if (!trip) return;
  if (!confirm(`"${trip.name}" wirklich löschen?`)) return;
  state.savedTrips = state.savedTrips.filter(t => t.id !== id);
  if (state.currentTrip && state.currentTrip.id === id) {
    state.currentTrip = null;
  }
  saveAll();
  renderArchive();
  showToast('🗑️ Reise gelöscht!');
}

// ============================================================
// OBSIDIAN EXPORT
// ============================================================
function exportToObsidian() {
  if (!state.currentTrip) return;
  const trip  = state.currentTrip;
  const today = new Date().toISOString().split('T')[0];
  const prog  = getProgress(trip);

  // ── Frontmatter ──────────────────────────────────────────
  let md = `---
erstellt: ${today}
typ: Notiz
datum: ${today}
projekt: ${trip.name}
tags:
  - urlaub
  - packliste
para_category: Note
status: in-progress
---

`;

  // ── Titel & Meta ─────────────────────────────────────────
  md += `# ✈️ ${trip.name}\n\n`;
  md += `> ${trip.days} Tage · ${trip.weather === 'warm' ? '☀️ Warm' : '❄️ Kalt'}${trip.sports ? ' · 🏃 Sport' : ''}\n\n`;
  md += `**Fortschritt:** ${prog.checked} / ${prog.total} erledigt (${prog.pct}%)\n\n`;

  // ── Kategorien & Checkboxen ───────────────────────────────
  trip.categories.forEach(cat => {
    md += `## ${cat.emoji} ${cat.name}\n\n`;
    if (cat.items.length === 0) {
      md += `_(leer)_\n\n`;
    } else {
      cat.items.forEach(item => {
        md += `- [${item.checked ? 'x' : ' '}] ${item.text}\n`;
      });
      md += '\n';
    }
  });

  // ── Download triggern ─────────────────────────────────────
  const blob     = new Blob([md], { type: 'text/markdown;charset=utf-8' });
  const url      = URL.createObjectURL(blob);
  const a        = document.createElement('a');
  const filename = trip.name.replace(/[<>:"/\\|?*\x00-\x1f]/g, '').replace(/\s+/g, '-') + '-Packliste.md';
  a.href         = url;
  a.download     = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('📥 Obsidian-Datei wird heruntergeladen!');
}

// ============================================================
// TOAST
// ============================================================
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  if (!el) return;
  el.textContent = msg;
  el.classList.remove('hidden');
  el.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.classList.add('hidden'), 300);
  }, 2200);
}

// ============================================================
// INIT
// ============================================================
setTab('planner');
</script>
